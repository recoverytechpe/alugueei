name: E2E (Playwright personas)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Supabase publishable/anon config used pelo bundle Vite.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Rota dev-only usada pelos testes para resetar senha das personas.
      DEV_TEST_SESSION_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install Playwright (Python)
        run: |
          python -m pip install --no-cache-dir playwright
          python -m playwright install --with-deps chromium

      - name: Start dev server
        run: |
          bun run dev > /tmp/dev.log 2>&1 &
          echo $! > /tmp/dev.pid

      - name: Wait for dev server (readiness on :8080)
        run: |
          echo "Aguardando http://localhost:8080 responder..."
          for i in $(seq 1 90); do
            code=$(curl -o /dev/null -s -w "%{http_code}" --max-time 2 http://localhost:8080 || echo "000")
            if [ "$code" != "000" ] && [ "$code" -lt "500" ]; then
              echo "✅ dev server pronto (HTTP $code) após ${i}s"
              exit 0
            fi
            # aborta cedo se o processo morreu
            if ! kill -0 "$(cat /tmp/dev.pid)" 2>/dev/null; then
              echo "❌ processo do dev server morreu"; tail -n 200 /tmp/dev.log; exit 1
            fi
            sleep 2
          done
          echo "❌ timeout esperando dev server"; tail -n 200 /tmp/dev.log; exit 1


      - name: Run E2E suite
        run: python3 tests/e2e/run.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: /tmp/browser/e2e
          if-no-files-found: ignore

      - name: Upload dev server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: /tmp/dev.log
          if-no-files-found: ignore

      - name: Stop dev server
        if: always()
        run: kill "$(cat /tmp/dev.pid)" || true
